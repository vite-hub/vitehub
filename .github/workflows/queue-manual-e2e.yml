name: manual live e2e

on:
  workflow_dispatch:

concurrency:
  group: manual-live-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup-cloudflare:
    name: setup
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Ensure Cloudflare Queues
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          API_BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}"
          AUTH_HEADER="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
          QUEUES="queue--77656c636f6d65 queue--77656c636f6d652d656d61696c"
          export QUEUES

          for queue in $QUEUES; do
            if ! npx wrangler queues list | grep -q "$queue"; then
              npx wrangler queues create "$queue"
            fi
          done

          QUEUE_STATE=$(curl --fail --silent --show-error \
            --header "$AUTH_HEADER" \
            "$API_BASE/queues")

          printf '%s' "$QUEUE_STATE" | node -e '
            const fs = require("node:fs");

            const queues = JSON.parse(fs.readFileSync(0, "utf8")).result || [];
            const wantedQueues = new Set(process.env.QUEUES.split(" "));

            for (const queue of queues) {
              if (!wantedQueues.has(queue.queue_name)) continue;
              console.log([queue.queue_id, queue.queue_name].join("\t"));
            }
          ' > /tmp/cloudflare-queues.tsv

          while IFS=$'\t' read -r queue_id queue_name; do
            [ -n "$queue_id" ] || continue

            CONSUMERS=$(curl --fail --silent --show-error \
              --header "$AUTH_HEADER" \
              "$API_BASE/queues/${queue_id}/consumers")

            printf '%s' "$CONSUMERS" | node -e '
              const fs = require("node:fs");

              const consumers = JSON.parse(fs.readFileSync(0, "utf8")).result || [];

              for (const consumer of consumers) {
                console.log([consumer.consumer_id, consumer.script_name || consumer.type || "unknown"].join("\t"));
              }
            ' | while IFS=$'\t' read -r consumer_id consumer_name; do
              [ -n "$consumer_id" ] || continue
              echo "Removing consumer ${consumer_name} from ${queue_name}"
              curl --fail --silent --show-error \
                --request DELETE \
                --header "$AUTH_HEADER" \
                "$API_BASE/queues/${queue_id}/consumers/${consumer_id}" >/dev/null
            done
          done < /tmp/cloudflare-queues.tsv

          for attempt in $(seq 1 10); do
            REMAINING=$(
              while IFS=$'\t' read -r queue_id queue_name; do
                [ -n "$queue_id" ] || continue

                curl --fail --silent --show-error \
                  --header "$AUTH_HEADER" \
                  "$API_BASE/queues/${queue_id}/consumers" | node -e '
                    const fs = require("node:fs");
                    const queueName = process.argv[1];
                    const consumers = JSON.parse(fs.readFileSync(0, "utf8")).result || [];

                    for (const consumer of consumers) {
                      console.log(`${queueName}:${consumer.script_name || consumer.type || "unknown"}:${consumer.consumer_id}`);
                    }
                  ' "$queue_name"
              done < /tmp/cloudflare-queues.tsv
            )

            if [ -z "$REMAINING" ]; then
              break
            fi

            if [ "$attempt" -eq 10 ]; then
              echo "Cloudflare queue consumers still attached: $REMAINING" >&2
              exit 1
            fi

            sleep 2
          done

  live-e2e:
    name: live e2e
    needs: setup-cloudflare
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        framework: [vite, nitro]
        provider: [cloudflare, vercel]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - run: pnpm --filter @vitehub/queue build
      - run: pnpm --filter @vitehub/kv build

      - name: Prepare Vercel project
        id: prepare_vercel
        if: matrix.provider == 'vercel'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          APP_DIR="playground/${{ matrix.framework }}"
          PROJECT_NAME="vitehub-playground-${{ matrix.framework }}"

          get_pulled_env_value() {
            node -e '
              const fs = require("node:fs")
              const file = process.argv[1]
              const key = process.argv[2]
              const lines = fs.readFileSync(file, "utf8").split(/\r?\n/)

              for (const line of lines) {
                if (!line.startsWith(`${key}=`)) continue
                let value = line.slice(key.length + 1)
                if (value.length >= 2) {
                  const first = value[0]
                  const last = value[value.length - 1]
                  if ((first === "\"" && last === "\"") || (first === "\x27" && last === "\x27")) {
                    if (first === "\"") {
                      try {
                        value = JSON.parse(value)
                      }
                      catch {
                        value = value.slice(1, -1)
                      }
                    }
                    else {
                      value = value.slice(1, -1)
                    }
                  }
                }
                process.stdout.write(value)
                process.exit(0)
              }
            ' "$1" "$2"
          }

          npx vercel link --yes --cwd "$APP_DIR" --project "$PROJECT_NAME" --token "$VERCEL_TOKEN"

          readarray -t VERCEL_CONFIG < <(node -e 'const { readFileSync } = require("node:fs"); const { join } = require("node:path"); const config = JSON.parse(readFileSync(join(process.argv[1], ".vercel", "project.json"), "utf8")); console.log(config.orgId); console.log(config.projectId);' "$APP_DIR")
          VERCEL_ORG_ID="${VERCEL_CONFIG[0]}"
          VERCEL_PROJECT_ID="${VERCEL_CONFIG[1]}"

          if [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Failed to read linked Vercel project metadata." >&2
            exit 1
          fi

          PULLED_ENV_FILE="$(mktemp)"
          trap 'rm -f "$PULLED_ENV_FILE"' EXIT
          VERCEL_ORG_ID="$VERCEL_ORG_ID" VERCEL_PROJECT_ID="$VERCEL_PROJECT_ID" \
            npx vercel env pull "$PULLED_ENV_FILE" --environment=production --yes --cwd "$APP_DIR" --token "$VERCEL_TOKEN" >/dev/null

          KV_URL="$(get_pulled_env_value "$PULLED_ENV_FILE" KV_REST_API_URL)"
          KV_TOKEN="$(get_pulled_env_value "$PULLED_ENV_FILE" KV_REST_API_TOKEN)"

          if [ -z "$KV_URL" ] || [ -z "$KV_TOKEN" ]; then
            echo "Vercel production env verification failed: KV_REST_API_URL and KV_REST_API_TOKEN must both be set on the linked project." >&2
            exit 1
          fi

          case "$KV_URL" in
            https://*) ;;
            *)
              echo "Vercel production env verification failed: KV_REST_API_URL must start with https://." >&2
              exit 1
              ;;
          esac

          echo "app_dir=$APP_DIR" >> "$GITHUB_OUTPUT"
          echo "org_id=$VERCEL_ORG_ID" >> "$GITHUB_OUTPUT"
          echo "project_id=$VERCEL_PROJECT_ID" >> "$GITHUB_OUTPUT"

      - name: Build (cloudflare × ${{ matrix.framework }})
        if: matrix.provider == 'cloudflare'
        env:
          KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: pnpm --dir playground/${{ matrix.framework }} exec nitro build --preset cloudflare-module

      - name: Build (vercel × ${{ matrix.framework }})
        if: matrix.provider == 'vercel'
        env:
          VERCEL_ORG_ID: ${{ steps.prepare_vercel.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ steps.prepare_vercel.outputs.project_id }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          APP_DIR="${{ steps.prepare_vercel.outputs.app_dir }}"
          npx vercel env run --cwd "$APP_DIR" --token "$VERCEL_TOKEN" -e production -- pnpm exec nitro build --preset vercel

      - name: Deploy Cloudflare
        id: deploy_cloudflare
        if: matrix.provider == 'cloudflare'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_WORKERS_SUBDOMAIN: ${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}
        run: |
          WORKER_NAME="vitehub-playground-${{ matrix.framework }}"
          npx wrangler --cwd "playground/${{ matrix.framework }}/.output/server" deploy --config wrangler.json --name "$WORKER_NAME"
          echo "url=https://${WORKER_NAME}.${CLOUDFLARE_WORKERS_SUBDOMAIN}.workers.dev" >> "$GITHUB_OUTPUT"
          echo "worker=$WORKER_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy Vercel
        id: deploy_vercel
        if: matrix.provider == 'vercel'
        env:
          VERCEL_ORG_ID: ${{ steps.prepare_vercel.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ steps.prepare_vercel.outputs.project_id }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          APP_DIR="${{ steps.prepare_vercel.outputs.app_dir }}"
          DEPLOYMENT_URL=$(VERCEL_ORG_ID="$VERCEL_ORG_ID" VERCEL_PROJECT_ID="$VERCEL_PROJECT_ID" npx vercel deploy --cwd "$APP_DIR" --prebuilt --prod --yes --token "$VERCEL_TOKEN" | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -n 1)
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "Failed to capture Vercel deployment URL." >&2
            exit 1
          fi

          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: KV Live E2E (${{ matrix.provider }} × ${{ matrix.framework }})
        run: |
          if [ "${{ matrix.provider }}" = "cloudflare" ]; then
            URL="${{ steps.deploy_cloudflare.outputs.url }}"
          else
            URL="${{ steps.deploy_vercel.outputs.url }}"
          fi
          pnpm --dir packages/kv test:e2e --mode live --provider ${{ matrix.provider }} --framework ${{ matrix.framework }} --url "$URL"

      - name: Queue Live E2E (${{ matrix.provider }} × ${{ matrix.framework }})
        timeout-minutes: 5
        run: |
          if [ "${{ matrix.provider }}" = "cloudflare" ]; then
            node packages/queue/test/e2e-live.mjs --framework "${{ matrix.framework }}" --provider cloudflare --url "${{ steps.deploy_cloudflare.outputs.url }}"
          else
            node packages/queue/test/e2e-live.mjs --framework "${{ matrix.framework }}" --provider vercel --url "${{ steps.deploy_vercel.outputs.url }}"
          fi
