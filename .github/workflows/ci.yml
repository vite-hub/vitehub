name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      package:
        description: Optional package filter for manual runs
        required: false
        default: all
      provider:
        description: Optional provider filter for manual runs
        required: false
        default: all
      framework:
        description: Optional framework filter for manual runs
        required: false
        default: all
      live:
        description: Run deploy and live e2e from this branch
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --dir docs test
      - run: pnpm build
      - run: pnpm docs:build

  e2e_matrix:
    runs-on: ubuntu-latest
    outputs:
      has_local: ${{ steps.e2e.outputs.hasLocal }}
      has_live: ${{ steps.e2e.outputs.hasLive }}
      live: ${{ steps.e2e.outputs.live }}
      local: ${{ steps.e2e.outputs.local }}
    steps:
      - uses: actions/checkout@v4

      - id: e2e
        env:
          VITEHUB_CI_FRAMEWORK: ${{ github.event_name == 'workflow_dispatch' && inputs.framework || '' }}
          VITEHUB_CI_PACKAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.package || '' }}
          VITEHUB_CI_PROVIDER: ${{ github.event_name == 'workflow_dispatch' && inputs.provider || '' }}
        run: node .github/scripts/discover-e2e-matrix.mjs

  e2e-local:
    needs: [quality, e2e_matrix]
    if: (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && needs.e2e_matrix.outputs.has_local == 'true'
    runs-on: ubuntu-latest
    name: e2e-local (${{ matrix.packageName }}, ${{ matrix.provider }}, ${{ matrix.framework }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.e2e_matrix.outputs.local) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - run: pnpm --dir ${{ matrix.packageDir }} build

      - name: E2E (${{ matrix.packageName }} / ${{ matrix.provider }} / ${{ matrix.framework }})
        run: pnpm --dir ${{ matrix.packageDir }} test:e2e --provider ${{ matrix.provider }} --framework ${{ matrix.framework }}

  live:
    needs: [quality, e2e_matrix]
    if: (github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.live)) && needs.e2e_matrix.outputs.has_live == 'true'
    runs-on: ubuntu-latest
    name: live (${{ matrix.packageName }}, ${{ matrix.provider }}, ${{ matrix.framework }})
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.e2e_matrix.outputs.live) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - run: pnpm --dir ${{ matrix.packageDir }} build

      - name: Build (${{ matrix.packageName }} / ${{ matrix.provider }} / ${{ matrix.framework }})
        env:
          NITRO_PRESET: ${{ matrix.provider == 'cloudflare' && 'cloudflare-module' || 'vercel' }}
          KV_REST_API_URL: ${{ matrix.provider == 'vercel' && matrix.requiresVercelKvBuildEnv && '********' || '' }}
          KV_REST_API_TOKEN: ${{ matrix.provider == 'vercel' && matrix.requiresVercelKvBuildEnv && '********' || '' }}
          SANDBOX_PROVIDER: ${{ matrix.packageName == 'sandbox' && matrix.provider || '' }}
          VERCEL_TOKEN: ${{ matrix.provider == 'vercel' && matrix.requiresVercelSandboxBuildEnv && '********' || '' }}
          VERCEL_TEAM_ID: ${{ matrix.provider == 'vercel' && matrix.requiresVercelSandboxBuildEnv && '********' || '' }}
          VERCEL_PROJECT_ID: ${{ matrix.provider == 'vercel' && matrix.requiresVercelSandboxBuildEnv && '********' || '' }}
        run: pnpm --dir ${{ matrix.packageDir }}/playground/${{ matrix.framework }} run build

      - name: Deploy Cloudflare
        if: matrix.provider == 'cloudflare'
        env:
          APP_NAME: ${{ matrix.appName }}
          BLOB_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME || '' }}
          CLOUDFLARE_CREATE_QUEUES: ${{ matrix.cloudflareCreateQueues }}
          CLOUDFLARE_CREATE_R2_BUCKET: ${{ matrix.cloudflareCreateR2Bucket }}
          CLOUDFLARE_DEPLOY_STRATEGY: ${{ matrix.cloudflareDeployStrategy }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_WORKERS_SUBDOMAIN: ${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}
          FRAMEWORK: ${{ matrix.framework }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          PACKAGE_DIR: ${{ matrix.packageDir }}
          PACKAGE_NAME: ${{ matrix.packageName }}
          WRANGLER_TEMPLATE: ${{ matrix.cloudflareWranglerTemplate }}
        run: |
          cd ${{ matrix.packageDir }}/playground/${{ matrix.framework }}
          if [ "$CLOUDFLARE_CREATE_R2_BUCKET" = "true" ]; then
            export BLOB_BUCKET_NAME="${BLOB_BUCKET_NAME:-vitehub-blob-e2e}"
            npx wrangler r2 bucket create "$BLOB_BUCKET_NAME" || true
          fi
          node "$GITHUB_WORKSPACE/.github/scripts/prepare-cloudflare-live-config.mjs"
          if [ "$CLOUDFLARE_CREATE_QUEUES" = "true" ]; then
            while IFS= read -r queue; do
              [ -n "$queue" ] || continue
              npx wrangler queues create "$queue" || true
            done < .output/cloudflare-queues.txt
          fi
          DEPLOY_DIR="$(cat .output/cloudflare-deploy-dir.txt)"
          DEPLOY_CONFIG="$(cat .output/cloudflare-deploy-config.txt)"
          npx wrangler --cwd "$DEPLOY_DIR" deploy --config "$DEPLOY_CONFIG" --no-bundle
          printf 'https://%s.%s.workers.dev\n' "${{ matrix.appName }}" "$CLOUDFLARE_WORKERS_SUBDOMAIN" > "$GITHUB_WORKSPACE/live-url.txt"

      - name: Deploy Vercel
        if: matrix.provider == 'vercel'
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN || secrets.VERCEL_BLOB_READ_WRITE_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd ${{ matrix.packageDir }}/playground/${{ matrix.framework }}
          npx vercel link --yes --project ${{ matrix.appName }} --token "$VERCEL_TOKEN"
          deploy_args=(--prod --prebuilt --yes --token "$VERCEL_TOKEN")
          if [ "${{ matrix.requiresVercelBlobDeployEnv }}" = "true" ] && [ -n "$BLOB_READ_WRITE_TOKEN" ]; then
            deploy_args+=(--env "BLOB_READ_WRITE_TOKEN=$BLOB_READ_WRITE_TOKEN")
          fi
          set -o pipefail
          npx vercel deploy "${deploy_args[@]}" 2>&1 | tee "$RUNNER_TEMP/vercel-deploy.log"
          node <<'NODE'
          const fs = require("node:fs")
          const output = fs.readFileSync(`${process.env.RUNNER_TEMP}/vercel-deploy.log`, "utf8")
          const production = [...output.matchAll(/Production:\s+(https:\/\/[^\s]+)/g)].at(-1)?.[1]
          const fallback = [...output.matchAll(/https:\/\/[^\s]+\.vercel\.app/g)].at(-1)?.[0]
          const url = production ?? fallback
          if (!url) {
            console.error(output)
            throw new Error("Could not determine Vercel deployment URL.")
          }
          fs.writeFileSync(`${process.env.GITHUB_WORKSPACE}/live-url.txt`, `${url}\n`)
          NODE

      - name: E2E Live (${{ matrix.packageName }} / ${{ matrix.provider }} / ${{ matrix.framework }})
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ matrix.provider == 'cloudflare' && secrets.CLOUDFLARE_ACCOUNT_ID || '' }}
          CLOUDFLARE_API_TOKEN: ${{ matrix.provider == 'cloudflare' && secrets.CLOUDFLARE_API_TOKEN || '' }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          URL="$(cat "$GITHUB_WORKSPACE/live-url.txt")"
          if [ "${{ matrix.provider }}" = "vercel" ]; then
            cd ${{ matrix.packageDir }}/playground/${{ matrix.framework }}
            npx vercel link --yes --project ${{ matrix.appName }} --token "$VERCEL_TOKEN"
            cd "$GITHUB_WORKSPACE"
          fi
          pnpm --dir ${{ matrix.packageDir }} test:e2e --mode live --provider ${{ matrix.provider }} --framework ${{ matrix.framework }} --url "$URL"
