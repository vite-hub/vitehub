name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run-live-e2e:
        description: Deploy playgrounds and run live e2e
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --dir docs test
      - run: pnpm build
      - run: pnpm docs:build

  e2e_matrix:
    runs-on: ubuntu-latest
    outputs:
      has_local: ${{ steps.e2e.outputs.hasLocal }}
      has_live: ${{ steps.e2e.outputs.hasLive }}
      live: ${{ steps.e2e.outputs.live }}
      local: ${{ steps.e2e.outputs.local }}
    steps:
      - uses: actions/checkout@v4

      - id: e2e
        run: node .github/scripts/discover-e2e-matrix.mjs

  e2e-local:
    needs: [quality, e2e_matrix]
    if: github.event_name == 'pull_request' && needs.e2e_matrix.outputs.has_local == 'true'
    runs-on: ubuntu-latest
    name: e2e-local (${{ matrix.packageName }}, ${{ matrix.provider }}, ${{ matrix.framework }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.e2e_matrix.outputs.local) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - run: pnpm --dir ${{ matrix.packageDir }} build

      - name: E2E (${{ matrix.packageName }} / ${{ matrix.provider }} / ${{ matrix.framework }})
        run: pnpm --dir ${{ matrix.packageDir }} test:e2e --provider ${{ matrix.provider }} --framework ${{ matrix.framework }}

  deploy:
    needs: [quality, e2e_matrix]
    if: (github.ref == 'refs/heads/main' || inputs.run-live-e2e) && needs.e2e_matrix.outputs.has_live == 'true'
    runs-on: ubuntu-latest
    name: deploy (${{ matrix.packageName }}, ${{ matrix.provider }}, ${{ matrix.framework }})
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.e2e_matrix.outputs.live) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - run: pnpm --dir ${{ matrix.packageDir }} build

      - name: Build (${{ matrix.packageName }} / ${{ matrix.provider }} / ${{ matrix.framework }})
        env:
          NITRO_PRESET: ${{ matrix.provider == 'cloudflare' && 'cloudflare-module' || 'vercel' }}
          KV_REST_API_URL: ${{ matrix.packageName == 'kv' && matrix.provider == 'vercel' && secrets.KV_REST_API_URL || '' }}
          KV_REST_API_TOKEN: ${{ matrix.packageName == 'kv' && matrix.provider == 'vercel' && secrets.KV_REST_API_TOKEN || '' }}
        run: |
          cd ${{ matrix.packageDir }}/playground/${{ matrix.framework }}
          if [ "${{ matrix.framework }}" = "nuxt" ]; then
            pnpm exec nuxi build
          else
            pnpm exec nitro build
          fi

      - name: Deploy Cloudflare
        if: matrix.provider == 'cloudflare'
        env:
          APP_NAME: ${{ matrix.appName }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_WORKERS_SUBDOMAIN: ${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}
          FRAMEWORK: ${{ matrix.framework }}
          KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          PACKAGE_NAME: ${{ matrix.packageName }}
        run: |
          cd ${{ matrix.packageDir }}/playground/${{ matrix.framework }}
          node <<'NODE'
          const fs = require("node:fs")

          function pushUnique(array, item, getKey) {
            const key = getKey(item)
            if (!array.some(entry => getKey(entry) === key)) array.push(item)
          }

          function queueBindingName(queue) {
            const encoded = Buffer.from(queue).toString("hex").toUpperCase()
            return encoded ? `QUEUE_${encoded}` : "QUEUE"
          }

          const generatedConfig = ".output/server/wrangler.json"
          const fallbackConfig = {
            assets: { binding: "ASSETS", directory: "../public" },
            compatibility_date: "2025-07-15",
            main: "index.mjs",
            no_bundle: true,
            rules: [{ type: "ESModule", globs: ["**/*.mjs", "**/*.js"] }],
          }
          const config = fs.existsSync(generatedConfig)
            ? JSON.parse(fs.readFileSync(generatedConfig, "utf8"))
            : fallbackConfig

          config.name = process.env.APP_NAME
          config.compatibility_flags = [...new Set([...(config.compatibility_flags || []), "nodejs_compat"])]

          if (process.env.PACKAGE_NAME === "kv") {
            config.kv_namespaces = [{ binding: "KV", id: process.env.KV_NAMESPACE_ID }]
          }

          if (process.env.PACKAGE_NAME === "queue") {
            const queue = `welcome-email-${process.env.FRAMEWORK}`
            config.queues ||= {}
            config.queues.consumers ||= []
            config.queues.producers ||= []
            pushUnique(config.queues.consumers, { queue }, entry => String(entry.queue))
            pushUnique(
              config.queues.producers,
              { binding: queueBindingName(queue), queue },
              entry => `${String(entry.binding)}:${String(entry.queue)}`,
            )
          }

          const queues = new Set()
          for (const consumer of config.queues?.consumers || []) {
            if (consumer.queue) queues.add(String(consumer.queue))
          }
          for (const producer of config.queues?.producers || []) {
            if (producer.queue) queues.add(String(producer.queue))
          }

          fs.writeFileSync(".output/server/wrangler.deploy.json", `${JSON.stringify(config, null, 2)}\n`)
          fs.writeFileSync(".output/server/cloudflare-queues.txt", `${[...queues].join("\n")}\n`)
          NODE
          if [ "${{ matrix.packageName }}" = "queue" ]; then
            while IFS= read -r queue; do
              [ -n "$queue" ] || continue
              npx wrangler queues create "$queue" || true
            done < .output/server/cloudflare-queues.txt
          fi
          npx wrangler deploy --config .output/server/wrangler.deploy.json
          printf 'https://%s.%s.workers.dev\n' "${{ matrix.appName }}" "$CLOUDFLARE_WORKERS_SUBDOMAIN" > "$GITHUB_WORKSPACE/live-url.txt"

      - uses: actions/upload-artifact@v4
        if: matrix.provider == 'cloudflare'
        with:
          name: live-url-${{ matrix.packageName }}-${{ matrix.provider }}-${{ matrix.framework }}
          path: live-url.txt

      - name: Deploy Vercel
        if: matrix.provider == 'vercel'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd ${{ matrix.packageDir }}/playground/${{ matrix.framework }}
          npx vercel link --yes --project ${{ matrix.appName }} --token "$VERCEL_TOKEN"
          set -o pipefail
          npx vercel deploy --prod --prebuilt --yes --token "$VERCEL_TOKEN" 2>&1 | tee "$RUNNER_TEMP/vercel-deploy.log"
          node <<'NODE'
          const fs = require("node:fs")
          const output = fs.readFileSync(`${process.env.RUNNER_TEMP}/vercel-deploy.log`, "utf8")
          const production = [...output.matchAll(/Production:\s+(https:\/\/[^\s]+)/g)].at(-1)?.[1]
          const fallback = [...output.matchAll(/https:\/\/[^\s]+\.vercel\.app/g)].at(-1)?.[0]
          const url = production ?? fallback
          if (!url) {
            console.error(output)
            throw new Error("Could not determine Vercel deployment URL.")
          }
          fs.writeFileSync(`${process.env.GITHUB_WORKSPACE}/live-url.txt`, `${url}\n`)
          NODE

      - uses: actions/upload-artifact@v4
        if: matrix.provider == 'vercel'
        with:
          name: live-url-${{ matrix.packageName }}-${{ matrix.provider }}-${{ matrix.framework }}
          path: live-url.txt

  e2e-live:
    needs: [deploy, e2e_matrix]
    if: (github.ref == 'refs/heads/main' || inputs.run-live-e2e) && needs.e2e_matrix.outputs.has_live == 'true'
    runs-on: ubuntu-latest
    name: e2e-live (${{ matrix.packageName }}, ${{ matrix.provider }}, ${{ matrix.framework }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.e2e_matrix.outputs.live) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: live-url-${{ matrix.packageName }}-${{ matrix.provider }}-${{ matrix.framework }}
          path: .live-url

      - name: E2E Live (${{ matrix.packageName }} / ${{ matrix.provider }} / ${{ matrix.framework }})
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          URL="$(cat .live-url/live-url.txt)"
          if [ "${{ matrix.provider }}" = "vercel" ]; then
            cd ${{ matrix.packageDir }}/playground/${{ matrix.framework }}
            npx vercel link --yes --project ${{ matrix.appName }} --token "$VERCEL_TOKEN"
            cd "$GITHUB_WORKSPACE"
          fi
          pnpm --dir ${{ matrix.packageDir }} test:e2e --mode live --provider ${{ matrix.provider }} --framework ${{ matrix.framework }} --url "$URL"
