name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Fallow dead-code
        shell: bash
        run: |
          report="$(mktemp)"
          set +e
          pnpm fallow:dead-code | tee "$report"
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "## Fallow Dead Code"
            echo
            cat "$report"
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - run: pnpm --dir docs test
      - run: pnpm docs:build

  deploy-and-test:
    name: deploy-and-test (${{ matrix.framework }}, ${{ matrix.provider }})
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production
    strategy:
      fail-fast: false
      matrix:
        provider: [cloudflare, vercel]
        framework: [nitro, nuxt, vite]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - run: pnpm --dir packages/kv build

      - name: Build (${{ matrix.provider }} × ${{ matrix.framework }})
        env:
          NITRO_PRESET: ${{ matrix.provider == 'cloudflare' && 'cloudflare-module' || 'vercel' }}
          # Presence forces upstash resolution at build; runtime swaps with real Vercel env.
          KV_REST_API_URL: ${{ matrix.provider == 'vercel' && '********' || '' }}
          KV_REST_API_TOKEN: ${{ matrix.provider == 'vercel' && '********' || '' }}
        run: |
          cd packages/kv/playground/${{ matrix.framework }}
          if [ "${{ matrix.framework }}" = "nuxt" ]; then
            npx nuxi build
          else
            npx nitro build
          fi

      - name: Deploy Cloudflare
        id: deploy_cloudflare
        if: matrix.provider == 'cloudflare'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_WORKERS_SUBDOMAIN: ${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}
          KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: |
          cd packages/kv/playground/${{ matrix.framework }}
          WORKER_NAME="vitehub-playground-${{ matrix.framework }}"
          APP_NAME=${{ matrix.framework }} envsubst < ../_shared/wrangler.template.jsonc > .output/wrangler.json
          npx wrangler --cwd .output/ deploy
          echo "url=https://${WORKER_NAME}.${CLOUDFLARE_WORKERS_SUBDOMAIN}.workers.dev" >> "$GITHUB_OUTPUT"

      - name: Deploy Vercel
        id: deploy_vercel
        if: matrix.provider == 'vercel'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          cd packages/kv/playground/${{ matrix.framework }}
          npx vercel link --yes --project vitehub-playground-${{ matrix.framework }} --token "$VERCEL_TOKEN"
          DEPLOYMENT_URL=$(npx vercel deploy --prod --prebuilt --yes --token "$VERCEL_TOKEN" | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -n 1)
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "Failed to capture Vercel deployment URL." >&2
            exit 1
          fi
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: E2E Live (${{ matrix.provider }} × ${{ matrix.framework }})
        run: |
          if [ "${{ matrix.provider }}" = "cloudflare" ]; then
            URL="${{ steps.deploy_cloudflare.outputs.url }}"
          else
            URL="${{ steps.deploy_vercel.outputs.url }}"
          fi
          pnpm --dir packages/kv test:e2e --mode live --provider ${{ matrix.provider }} --framework ${{ matrix.framework }} --url "$URL"
