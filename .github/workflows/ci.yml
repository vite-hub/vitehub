name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Fallow dead-code
        shell: bash
        run: |
          report="$(mktemp)"
          set +e
          pnpm fallow:dead-code | tee "$report"
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "## Fallow Dead Code"
            echo
            cat "$report"
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - run: pnpm --dir docs test
      - run: pnpm docs:build
