name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --dir docs test
      - run: pnpm build
      - run: pnpm docs:build

  e2e-local:
    needs: quality
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: [cloudflare, vercel]
        framework: [nitro, nuxt, vite]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - run: pnpm --dir packages/kv build

      - name: E2E (${{ matrix.provider }} × ${{ matrix.framework }})
        run: pnpm --dir packages/kv test:e2e --provider ${{ matrix.provider }} --framework ${{ matrix.framework }}

  deploy-cloudflare:
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [nitro, nuxt, vite]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - run: pnpm --dir packages/kv build

      - name: Build & deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: |
          cd packages/kv/playground/${{ matrix.framework }}
          if [ "${{ matrix.framework }}" = "nuxt" ]; then
            NITRO_PRESET=cloudflare-module npx nuxi build
          else
            NITRO_PRESET=cloudflare-module npx nitro build
          fi
          envsubst < wrangler.jsonc > .output/wrangler.json
          npx wrangler --cwd .output/ deploy

  deploy-vercel:
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [nitro, nuxt, vite]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - run: pnpm --dir packages/kv build

      - name: Build & deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          # Presence forces upstash resolution at build; values are masked sentinels — runtime swaps with real Vercel env.
          KV_REST_API_URL: "********"
          KV_REST_API_TOKEN: "********"
        run: |
          cd packages/kv/playground/${{ matrix.framework }}
          if [ "${{ matrix.framework }}" = "nuxt" ]; then
            NITRO_PRESET=vercel npx nuxi build
          else
            NITRO_PRESET=vercel npx nitro build
          fi
          npx vercel link --yes --project vitehub-playground-${{ matrix.framework }} --token "$VERCEL_TOKEN"
          npx vercel deploy --prod --prebuilt --yes --token "$VERCEL_TOKEN"

  e2e-live:
    needs: [deploy-cloudflare, deploy-vercel]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: [cloudflare, vercel]
        framework: [nitro, nuxt, vite]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: E2E Live (${{ matrix.provider }} × ${{ matrix.framework }})
        env:
          CF_SUBDOMAIN: ${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}
        run: |
          if [ "${{ matrix.provider }}" = "cloudflare" ]; then
            URL="https://vitehub-playground-${{ matrix.framework }}.$CF_SUBDOMAIN.workers.dev"
          else
            URL="https://vitehub-playground-${{ matrix.framework }}.vercel.app"
          fi
          pnpm --dir packages/kv test:e2e --mode live --provider ${{ matrix.provider }} --framework ${{ matrix.framework }} --url "$URL"
