name: Setup
description: Checkout, install pnpm + Node, install deps
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 10.33.0

    - uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
