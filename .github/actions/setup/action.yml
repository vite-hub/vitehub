name: Setup
description: Install pnpm + Node and project dependencies
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v5
      with:
        version: 10.33.0

    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
