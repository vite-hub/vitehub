<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vitehub-next</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1020;
        color: #f4f7fb;
      }

      main {
        width: min(40rem, calc(100vw - 3rem));
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 6vw, 3.5rem);
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #c6d2e1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>vitehub-next</h1>
      <p>A Vite Plus starter package. The library build is published from <code>dist/</code>.</p>
    </main>
  </body>
</html>
